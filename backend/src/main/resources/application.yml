spring:
  application:
    name: healthcare-platform-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthcare}
    username: ${DB_USER:healthcare}
    password: ${DB_PASS:healthcare_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 50
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  email:
    from: ${SMTP_USER:noreply@healthcare.kz}
    enabled: ${EMAIL_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-random-string-at-least-256-bits-for-hs512}
    access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P30D}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    internal-token: ${AI_SERVICE_INTERNAL_TOKEN:internal-shared-secret-between-backend-and-ai}
    timeout: ${AI_SERVICE_TIMEOUT:PT180S}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin_secret}
      bucket: ${MINIO_BUCKET:medical-files}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

logging:
  level:
    root: INFO
    kz.healthcare: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,modulith
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
