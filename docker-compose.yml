name: healthcare-platform

services:

  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-healthcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare_secret}
      AI_POSTGRES_DB: ${AI_POSTGRES_DB:-ai_feedback}
      AI_POSTGRES_USER: ${AI_POSTGRES_USER:-ai_feedback}
      AI_POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD:-ai_feedback_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [hc-net]

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hc-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [hc-net]

  # ─── MinIO (S3-compatible) ──────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: hc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [hc-net]

  # ─── MinIO bootstrap (creates bucket) ───────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    container_name: hc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-medical-files}
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set none local/$$MINIO_BUCKET;
      echo 'MinIO bucket initialized';
      "
    networks: [hc-net]

  # ─── MLflow tracking server ─────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: hc-mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks: [hc-net]

  # ─── Backend (Java) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hc-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-healthcare}
      DB_USER: ${POSTGRES_USER:-healthcare}
      DB_PASS: ${POSTGRES_PASSWORD:-healthcare_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-medical-files}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-internal-shared-secret-between-backend-and-ai}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-very-long-random-string-at-least-256-bits-for-hs512}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [hc-net]

  # ─── Ollama (local LLM) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hc-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [hc-net]

  # ─── Ollama model pull (runs once, cached in volume) ────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: hc-ollama-init
    restart: no
    entrypoint: >
      /bin/sh -c "
        until curl -sf http://ollama:11434/api/tags; do
          echo 'Waiting for Ollama...'; sleep 3;
        done;
        ollama pull ${OLLAMA_MODEL:-llama3.2:3b};
        echo 'Model ready';
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    networks: [hc-net]

  # ─── AI Service (Python) ────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: hc-ai
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      ENVIRONMENT: dev
      DB_URL: postgresql+asyncpg://${AI_POSTGRES_USER:-ai_feedback}:${AI_POSTGRES_PASSWORD:-ai_feedback_secret}@postgres:5432/${AI_POSTGRES_DB:-ai_feedback}
      AI_SERVICE_INTERNAL_TOKEN: ${AI_SERVICE_INTERNAL_TOKEN:-internal-shared-secret-between-backend-and-ai}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: cardiology-diagnosis
      MLFLOW_MODEL_ALIAS: champion
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://backend:8080
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    networks: [hc-net]

  # ─── Frontend (React) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hc-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks: [hc-net]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mlflow_data:
  ollama_data:

networks:
  hc-net:
    driver: bridge
